name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
version-template: '$MAJOR.$MINOR.$PATCH'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: Features
    labels:
      - feat
  - title: Fixes
    labels:
      - fix
  - title: Documentation
    labels:
      - docs
  - title: Maintenance
    labels:
      - chore

exclude-labels:
  - skip-changelog

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - feat
  patch:
    labels:
      - fix
      - docs
      - chore
  default: patch

autolabeler:
  - label: docs
    files:
      - 'docs/**'
      - 'README.md'
  - label: chore
    files:
      - '.github/**'
  - label: chore
    files:
      - 'zio-nats-test/**'
      - 'zio-nats-testkit/**'

sort-by: merged_at
sort-direction: descending
