name: Binary Compatibility

on:
  pull_request:
    branches: [master]

jobs:
  mima:
    name: MiMa Binary Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/setup-action@v1
        with:
          apps: sbt

      - name: Run MiMa
        run: sbt -batch "zioNatsCore/mimaReportBinaryIssues; zioNatsZioBlocks/mimaReportBinaryIssues; zioNatsJsoniter/mimaReportBinaryIssues; zioNatsPlayJson/mimaReportBinaryIssues; zioNatsTestkit/mimaReportBinaryIssues"
