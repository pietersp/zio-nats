name: CI

on:
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Compile, Test, Format Check
    runs-on: ubuntu-latest # Docker pre-installed; required for testcontainers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/setup-action@v1
        with:
          apps: sbt

      - name: Check formatting
        run: sbt -batch --client "scalafmtCheckAll"

      - name: Test # also compiles all subprojects
        run: sbt -batch --client "zioNatsTest/test"

      - name: Cleanup
        run: sbt --client shutdown
        if: always()
